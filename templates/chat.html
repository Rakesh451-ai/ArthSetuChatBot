<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArthSetu Chat — Finance AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#050508;--surface:#0d0d14;--surface2:#111118;
    --border:rgba(123,97,255,0.15);
    --accent:#7b61ff;--accent2:#00ffc8;
    --text:#e8e8f0;--muted:#6b6b80;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
    font-family:'Syne',sans-serif;
    background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;
}
body::before{
    content:'';position:fixed;inset:0;
    background-image:
        linear-gradient(rgba(123,97,255,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(123,97,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
}

/* Header */
header{
    position:relative;z-index:10;
    background:rgba(5,5,8,0.95);
    border-bottom:1px solid var(--border);
    padding:14px 20px;
    display:flex;align-items:center;gap:12px;
    flex-shrink:0;
}
.back{
    font-family:'Space Mono',monospace;font-size:0.85rem;
    color:var(--muted);text-decoration:none;margin-right:4px;
}
.back:hover{color:var(--accent2);}
.avatar{
    width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#5a40ff);
    display:flex;align-items:center;justify-content:center;font-size:1rem;
    flex-shrink:0;
}
.hname{font-weight:700;font-size:0.95rem;}
.hstatus{
    font-family:'Space Mono',monospace;font-size:0.68rem;
    color:var(--accent2);display:flex;align-items:center;gap:5px;margin-top:2px;
}
.hstatus::before{
    content:'';width:6px;height:6px;border-radius:50%;
    background:var(--accent2);animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Messages */
#msgs{
    position:relative;z-index:1;
    flex:1;overflow-y:auto;
    padding:20px;
    display:flex;flex-direction:column;gap:14px;
}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-track{background:transparent;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.msg{display:flex;gap:10px;animation:pop 0.25s ease;}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}

.av{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:0.9rem;flex-shrink:0;align-self:flex-end;
}
.msg.ArthSetu .av{background:linear-gradient(135deg,var(--accent),#5a40ff);}
.msg.user .av{background:#1a1a2e;border:1px solid var(--border);}

.bubble{
    max-width:72%;padding:11px 15px;
    border-radius:16px;line-height:1.65;font-size:0.88rem;
}
.msg.ArthSetu .bubble{
    background:var(--surface);border:1px solid var(--border);
    border-radius:4px 16px 16px 16px;color:var(--text);
}
.msg.user .bubble{
    background:linear-gradient(135deg,var(--accent),#5a40ff);
    color:#fff;border-radius:16px 4px 16px 16px;
}

/* Typing dots */
.typing-dots{display:flex;gap:5px;padding:6px 2px;align-items:center;}
.typing-dots span{
    width:8px;height:8px;border-radius:50%;background:var(--muted);
    animation:bounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);background:var(--muted);}30%{transform:translateY(-7px);background:var(--accent);}}

/* Bottom input area */
.bottom{
    position:relative;z-index:10;
    background:rgba(5,5,8,0.97);
    border-top:1px solid var(--border);
    padding:12px 16px;flex-shrink:0;
}

/* Quick prompts - Finance focused */
.qps{
    display:flex;gap:7px;overflow-x:auto;margin-bottom:10px;
    padding-bottom:2px;scrollbar-width:none;
}
.qps::-webkit-scrollbar{display:none;}
.qp{
    background:rgba(123,97,255,0.08);
    border:1px solid rgba(123,97,255,0.2);
    border-radius:20px;padding:5px 13px;
    font-size:0.73rem;color:var(--accent);
    cursor:pointer;transition:all 0.2s;
    white-space:nowrap;font-family:'Space Mono',monospace;
    flex-shrink:0;
}
.qp:hover{background:rgba(123,97,255,0.18);border-color:var(--accent);}

.row{display:flex;gap:8px;align-items:flex-end;}
#inp{
    flex:1;background:var(--surface);
    border:1px solid var(--border);border-radius:14px;
    padding:11px 15px;color:var(--text);
    font-family:'Syne',sans-serif;font-size:0.9rem;
    outline:none;resize:none;min-height:44px;max-height:110px;
    line-height:1.5;transition:border-color 0.2s;
}
#inp:focus{border-color:var(--accent);}
#inp::placeholder{color:var(--muted);}

.send{
    width:44px;height:44px;border-radius:12px;border:none;
    background:linear-gradient(135deg,var(--accent),#5a40ff);
    color:#fff;font-size:1rem;cursor:pointer;
    transition:all 0.2s;flex-shrink:0;
}
.send:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(123,97,255,0.4);}
.send:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
</style>
</head>
<body>

<header>
    <a href="/" class="back">←</a>
    <div class="avatar">📈</div>
    <div>
        <div class="hname">ArthSetu Chat</div>
        <div class="hstatus">Finance Advisor • Online</div>
    </div>
</header>

<div id="msgs">
    <!-- welcome message added by JS -->
</div>

<div class="bottom">
    <div class="qps">
        <div class="qp" onclick="send('Explain DCF valuation step by step')">📊 DCF Model</div>
        <div class="qp" onclick="send('What are the key financial ratios for profitability analysis?')">📈 Key Ratios</div>
        <div class="qp" onclick="send('How to prepare for an investment banking interview?')">🏦 IB Interview</div>
        <div class="qp" onclick="send('Difference between NPV and IRR')">💰 NPV vs IRR</div>
        <div class="qp" onclick="send('Tips for financial modeling test')">📐 Modeling Tips</div>
    </div>
    <div class="row">
        <textarea id="inp" rows="1"
            placeholder="Ask me anything about finance, investments, or career..."
            oninput="resize(this)"
            onkeydown="keydown(event)"></textarea>
        <button class="send" id="sendbtn" onclick="send()">➤</button>
    </div>
</div>

<script>
const msgsEl  = document.getElementById("msgs");
const inpEl   = document.getElementById("inp");
const sendBtn = document.getElementById("sendbtn");

let history = [];
let busy    = false;

// ── Resize textarea ──
function resize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 110) + "px";
}

// ── Enter key sends ──
function keydown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
}

// ── Add message bubble ──
function addMsg(role, html) {
    const div = document.createElement("div");
    div.className = "msg " + role;

    const av = document.createElement("div");
    av.className = "av";
    av.innerText = role === "ArthSetu" ? "📈" : "👤";

    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = html;

    div.appendChild(av);
    div.appendChild(bub);
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return bub;
}

// ── Typing indicator ──
function showTyping() {
    const div = document.createElement("div");
    div.className = "msg ArthSetu";
    div.id = "typing";
    const av = document.createElement("div");
    av.className = "av"; av.innerText = "📈";
    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    div.appendChild(av); div.appendChild(bub);
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
}
function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

// ── Format AI reply (bold **text**, newlines) ──
function format(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br>");
}

// ── Send message ──
async function send(preset) {
    if (busy) return;

    const text = preset || inpEl.value.trim();
    if (!text) return;

    inpEl.value = "";
    inpEl.style.height = "auto";

    addMsg("user", text);
    history.push({ role: "user", content: text });

    busy = true;
    sendBtn.disabled = true;
    showTyping();

    try {
        const res = await fetch("/chatbot", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: history })
        });

        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        hideTyping();

        const reply = data.reply || "Sorry, no response received.";
        addMsg("ArthSetu", format(reply));
        history.push({ role: "assistant", content: reply });

    } catch(e) {
        hideTyping();
        console.error("Chat error:", e);
        addMsg("ArthSetu", "⚠️ Error: " + e.message + "<br>Check your terminal for details.");
    }

    busy = false;
    sendBtn.disabled = false;
    inpEl.focus();
}

// ── Welcome message on load (Finance focused) ──
window.onload = () => {
    addMsg("ArthSetu",
        "Welcome to <strong>ArthSetu Chat</strong> 📈<br><br>" +
        "I'm your AI finance assistant, here to help with:<br>" +
        "• 💼 Financial analysis & valuation (DCF, ratios, modeling)<br>" +
        "• 📊 Investment strategies & risk management<br>" +
        "• 🏦 Finance career prep (IB, PE, corporate finance)<br>" +
        "• 📝 Resume reviews & interview tips for finance roles<br>" +
        "• 📚 Explaining concepts like NPV, IRR, CAPM, and more<br><br>" +
        "What finance topic would you like to explore today?"
    );
    inpEl.focus();
};
</script>
</body>
</html>
