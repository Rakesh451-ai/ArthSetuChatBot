<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArthSetu Chat – Finance PDF Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
        }
        h1 { color: #7c6af7; margin-bottom: 20px; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #3d3d6e;
            background: #0f0f1a;
            color: white;
        }
        button {
            background: linear-gradient(135deg, #7c6af7, #5a4fcf);
            cursor: pointer;
            font-weight: bold;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 12px;
            display: none;
        }
        .loading { display: none; text-align: center; margin: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 Finance PDF Analyzer</h1>
    <p>Upload a finance document (annual report, valuation, etc.)</p>
    <input type="file" id="pdfFile" accept=".pdf">
    <button onclick="analyzePDF()">Analyze PDF</button>
    <div class="loading" id="loading">⏳ Analyzing... please wait</div>
    <div id="result">
        <h3>📝 Summary</h3>
        <p id="summary"></p>
        <h3>⭐ Key Points</h3>
        <ul id="points"></ul>
        <h3>📚 Important Terms</h3>
        <ul id="terms"></ul>
    </div>
</div>

<script>
async function analyzePDF() {
    const fileInput = document.getElementById('pdfFile');
    const file = fileInput.files[0];
    if (!file) {
        alert('Please select a PDF file.');
        return;
    }

    const formData = new FormData();
    formData.append('pdf', file);

    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';

    try {
        const response = await fetch('/summarize', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();

        if (data.error) {
            alert('Error: ' + data.error);
            return;
        }

        // Display results
        document.getElementById('summary').innerText = data.summary || 'No summary.';
        
        const pointsList = document.getElementById('points');
        pointsList.innerHTML = '';
        (data.key_points || []).forEach(p => {
            const li = document.createElement('li');
            li.textContent = p;
            pointsList.appendChild(li);
        });

        const termsList = document.getElementById('terms');
        termsList.innerHTML = '';
        (data.important_terms || []).forEach(t => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${t.term}</strong>: ${t.meaning}`;
            termsList.appendChild(li);
        });

        document.getElementById('result').style.display = 'block';
    } catch (err) {
        alert('Request failed: ' + err.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}
</script>
</body>
</html>
